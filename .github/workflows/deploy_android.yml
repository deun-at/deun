name: Deploy Android to Google Play

on:
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.41.9
          cache: true

      - name: Install Flutter Dependencies
        run: flutter pub get

      - name: Add Environment Variables
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          MOBILE_AD_MOB_ANDROID_GROUP_LIST: ${{ secrets.MOBILE_AD_MOB_ANDROID_GROUP_LIST }}
          MOBILE_AD_MOB_ANDROID_EXPENSE_LIST: ${{ secrets.MOBILE_AD_MOB_ANDROID_EXPENSE_LIST }}
        run: |
          mkdir -p .env_flutter
          cat > .env_flutter/production.env <<EOF
          SUPABASE_URL=$SUPABASE_URL
          SUPABASE_ANON_KEY=$SUPABASE_ANON_KEY
          MOBILE_AD_MOB_ANDROID_GROUP_LIST=$MOBILE_AD_MOB_ANDROID_GROUP_LIST
          MOBILE_AD_MOB_ANDROID_EXPENSE_LIST=$MOBILE_AD_MOB_ANDROID_EXPENSE_LIST
          EOF

      - name: Install Android Keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          echo -n "$KEYSTORE_BASE64" | base64 --decode > android/upload-keystore.jks

          cat > android/key.properties <<EOF
          storeFile=upload-keystore.jks
          storePassword=$KEYSTORE_PASSWORD
          keyAlias=$KEY_ALIAS
          keyPassword=$KEY_PASSWORD
          EOF

      - name: Build Android App Bundle
        run: flutter build appbundle --release --dart-define-from-file .env_flutter/production.env

      - name: Upload to Google Play
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: app.deun.www
          releaseFiles: build/app/outputs/bundle/release/app-release.aab
          track: internal
          status: completed

      - name: Clean up
        if: always()
        run: |
          rm -f android/upload-keystore.jks
          rm -f android/key.properties
